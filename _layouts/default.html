<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
    <style>
      /* 1. Force the entire page background to match the body color */
      body {
        background-color: #1b1b1b !important;
      }
      
      /* 2. Kill the header's inherited black background and borders */
      header {
        background: none !important;
        background-color: transparent !important;
        border-bottom: none !important;
        padding-bottom: 0 !important;
        margin-bottom: 0 !important;
      }

      /* 3. Center everything and fix the width */
      .inner {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        background: none !important;
      }

      /* 4. Fix the typography scale so it isn't "too big" */
      h1#project_title {
        font-size: 2rem;
        margin-bottom: 5px;
      }
      h2#project_tagline {
        font-size: 1.1rem;
        font-weight: normal;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <header class="inner">
      <h1 id="project_title">{{ site.title }}</h1>
      <h2 id="project_tagline">{{ site.description }}</h2>
    </header>

    <section class="inner">
      {{ content }}
    </section>
  </body>
</html>
