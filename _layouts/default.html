<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
    <style>
      /* Center everything and remove the "strip" containers */
      .inner {
        max-width: 750px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      
      /* Force the body background to stay unified */
      body {
        background: #1b1b1b; /* The native Hacker "dark gray" */
      }

      /* Clean up the header spacing since the wrapper is gone */
      header {
        margin-bottom: 20px;
      }
      
      h1#project_title {
        color: #00ff00; /* Neon green */
        font-size: 2.5em;
      }
    </style>
  </head>

  <body>
    <header class="inner">
      <h1 id="project_title">{{ site.title }}</h1>
      <h2 id="project_tagline">{{ site.description }}</h2>
    </header>

    <section class="inner">
      {{ content }}
    </section>
  </body>
</html>
